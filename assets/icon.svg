<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#0f0f13"/>
    </linearGradient>

    <!-- Flame gradient -->
    <radialGradient id="flameCore" cx="50%" cy="70%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#ffe066" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#ff8c42" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="flameOuter" cx="50%" cy="60%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c6af7"  stop-opacity="0"/>
    </radialGradient>

    <!-- Glow behind flame -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#7c6af7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>

    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2a2a3e"/>
      <stop offset="50%"  stop-color="#35354e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>

    <!-- Shackle gradient -->
    <linearGradient id="shackleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3d3d58"/>
      <stop offset="50%"  stop-color="#50507a"/>
      <stop offset="100%" stop-color="#3d3d58"/>
    </linearGradient>

    <!-- Wax drip highlight -->
    <linearGradient id="waxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8b8ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="subtleglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle inner vignette ring -->
  <rect width="1024" height="1024" rx="220" ry="220"
        fill="none" stroke="#7c6af7" stroke-width="2" opacity="0.12"/>

  <!-- ── PADLOCK BODY ─────────────────────────────────────── -->
  <!-- Body: rounded rectangle, lower half of icon -->
  <rect x="288" y="530" width="448" height="348" rx="60" ry="60"
        fill="url(#bodyGrad)" stroke="#4a4a70" stroke-width="3"/>

  <!-- Body highlight stripe -->
  <rect x="288" y="530" width="448" height="100" rx="60" ry="60"
        fill="url(#waxGrad)"/>
  <rect x="288" y="570" width="448" height="60"
        fill="url(#waxGrad)"/>

  <!-- ── PADLOCK SHACKLE ─────────────────────────────────── -->
  <!-- Shackle: U-shaped arc sitting above the body -->
  <path d="M 362 540
             L 362 400
             A 150 150 0 0 1 662 400
             L 662 540"
        fill="none"
        stroke="url(#shackleGrad)"
        stroke-width="72"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Shackle inner highlight -->
  <path d="M 362 540
             L 362 400
             A 150 150 0 0 1 662 400
             L 662 540"
        fill="none"
        stroke="#6060a0"
        stroke-width="20"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- ── CANDLE INSIDE LOCK BODY ─────────────────────────── -->
  <!-- Candle body (pillar) -->
  <rect x="468" y="580" width="88" height="220" rx="10" ry="10"
        fill="#d4c8ff" opacity="0.18"/>
  <rect x="474" y="580" width="76" height="220" rx="8" ry="8"
        fill="#c8b8ff" opacity="0.22"/>

  <!-- Candle top rim -->
  <ellipse cx="512" cy="582" rx="44" ry="10"
           fill="#d4c8ff" opacity="0.35"/>

  <!-- Wick -->
  <line x1="512" y1="540" x2="512" y2="582"
        stroke="#8888a0" stroke-width="5" stroke-linecap="round"/>

  <!-- ── FLAME ─────────────────────────────────────────────── -->
  <!-- Outer glow halo -->
  <ellipse cx="512" cy="490" rx="100" ry="120"
           fill="url(#glowGrad)" filter="url(#glow)"/>

  <!-- Outer flame shape -->
  <path d="M 512 398
             C 536 418 558 445 556 476
             C 554 506 538 526 512 536
             C 486 526 470 506 468 476
             C 466 445 488 418 512 398 Z"
        fill="url(#flameOuter)" filter="url(#softglow)" opacity="0.85"/>

  <!-- Main flame -->
  <path d="M 512 412
             C 530 430 546 452 544 475
             C 542 500 530 518 512 526
             C 494 518 482 500 480 475
             C 478 452 494 430 512 412 Z"
        fill="url(#flameCore)" filter="url(#subtleglow)"/>

  <!-- Flame highlight (inner bright core) -->
  <path d="M 512 438
             C 520 448 526 462 525 475
             C 524 488 519 497 512 501
             C 505 497 500 488 499 475
             C 498 462 504 448 512 438 Z"
        fill="#ffffff" opacity="0.75"/>

  <!-- ── KEYHOLE ─────────────────────────────────────────── -->
  <!-- Keyhole circle -->
  <circle cx="512" cy="718" r="36"
          fill="#0f0f13" stroke="#3a3a58" stroke-width="2" opacity="0.85"/>

  <!-- Keyhole slot -->
  <rect x="500" y="740" width="24" height="48" rx="6" ry="6"
        fill="#0f0f13" opacity="0.85"/>

  <!-- Subtle keyhole glow -->
  <circle cx="512" cy="718" r="28"
          fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.3"/>
</svg>
